<!DOCTYPE html>
<!-- Indique au navigateur que nous utilisons HTML5 -->

<html lang="en">

<head>

    <!-- Encodage UTF-8 pour accepter les caractères spéciaux -->
    <meta charset="UTF-8">

    <!-- Rend le site responsive sur mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Titre affiché dans l'onglet -->
    <title>Sign Up Page</title>

    <!-- Liaison avec le fichier CSS -->
    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <!-- Conteneur principal -->
    <div class="container">

        <!-- SECTION GAUCHE -->
        <div class="left-section">

            <!-- Titre principal -->
            <h1>Ready to start your success story? </h1>

            <!-- Sous-titre -->
            <p class="description">
                Signup to our website and start leafing <br>through your favorite literature today!<br>
            </p>

            <!-- Formulaire -->
            <form action="#">

                <!-- Groupe Full Name -->
                <div class="form-group">

                    <label for="fullname">
                        Full name
                    </label>

                    <input
                        type="text"
                        id="fullname"
                        placeholder="Jane Doe"
                    >

                </div>

                <!-- Groupe Email -->
                <div class="form-group">

                    <label for="email">
                        Email
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="janedoe@mail.com"
                    >

                </div>

                <!-- Groupe Area of Interest -->
                <div class="form-group">

                    <label for="interest">
                        Area of interest
                    </label>

                    <select id="interest">

                        <option selected disabled>
                            Select an option
                        </option>

                        <option>
                            Web Development
                        </option>

                        <option>
                            Mobile Development
                        </option>

                        <option>
                            Cybersecurity
                        </option>

                    </select>

                </div>

                <!-- Checkbox -->
                <div class="checkbox-group">

                    <input
                        type="checkbox"
                        id="terms"
                    >

                    <label for="terms">

                        I agree to the

                        <a href="#">
                            Terms & Conditions
                        </a>

                    </label>

                </div>

                <!-- Bouton -->
                <button type="submit">

                    Sign up

                </button>

            </form>

        </div>

        <!-- SECTION DROITE -->
        <div class="right-section">

            <!-- Illustration -->
            <img
                src="../assets/images/illustration.jpg"
                alt="Illustration"
            >

        </div>

    </div>

</body>

</html>
